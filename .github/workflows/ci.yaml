name: CI Pipeline

on:
  push:
    branches-ignore:
      - 'master'
  pull_request:
    branches:
      - '**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest httpx fastapi pydantic sqlalchemy pandas numpy mlflow scikit-learn psycopg2-binary

      - name: Run Linter (Flake8)
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python ou des variables non définies
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero traite les erreurs de style résiduelles comme des avertissements
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests
        run: |
          # Ajout du chemin racine pour éviter les ModuleNotFoundError
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: false